version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: campuspulse_db
    environment:
      POSTGRES_USER: campuspulse_user
      POSTGRES_PASSWORD: secret123
      POSTGRES_DB: campuspulse_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
